<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bot Stopped</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 { color: #ff4444; margin-bottom: 10px; }
        p { color: #666; margin-bottom: 30px; }
        a {
            text-decoration: none;
            background: #25D366;
            color: white;
            padding: 12px 25px;
            border-radius: 6px;
            font-weight: bold;
        }
        a:hover { background: #1da853; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⛔ Bot Stopped</h1>
        <p>The messaging schedule has been cancelled and the browser closed.</p>
        <a href="/">Start New Campaign</a>
    </div>
</body>
</html>
